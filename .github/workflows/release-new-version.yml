name: Create a New Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version component to bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - rc

run-name: "Release ${{ inputs.bump }} bump on ${{ github.ref_name }}"

permissions:
  contents: write

jobs:
  release:
    uses: valkyrjaio/.github/.github/workflows/_create-php-release.yml@9b108a21f1a7161aef43c83046266f2c8de60165
    secrets: inherit
    with:
      bump: ${{ inputs.bump }}
      dependencies: |
        [
          {"name": "Root Packages", "command": "root-outdated-check"},
          {"name": "PHPStan",  "command": "phpstan-outdated-check"}
        ]
      info-class-path: src/PhpStan/Constant/PhpStanInfo.php
      info-class-name: PhpStanInfo

  update-refs:
    name: Update Workflow Refs
    needs: release
    uses: valkyrjaio/.github/.github/workflows/_update-workflow-refs.yml@9b108a21f1a7161aef43c83046266f2c8de60165
    secrets: inherit
    with:
      source-repo: ${{ github.event.repository.name }}
